<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020810"/>
      <stop offset="100%" style="stop-color:#060E18"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D2FF"/>
      <stop offset="100%" style="stop-color:#3A7BD5"/>
    </linearGradient>
    <linearGradient id="wrenchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D2FF"/>
      <stop offset="100%" style="stop-color:#0090CC"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D2FF"/>
      <stop offset="100%" style="stop-color:#3A7BD5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="#00D2FF" stroke-width="1" opacity="0.15"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="#00D2FF" stroke-width="1.5" opacity="0.25"/>

  <!-- Main gradient ring -->
  <circle cx="200" cy="200" r="145" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.6" filter="url(#glow)"/>

  <!-- Inner background -->
  <circle cx="200" cy="200" r="140" fill="#0A1E32" opacity="0.8"/>

  <!-- Subtle inner ring -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="#00D2FF" stroke-width="1" opacity="0.1"/>

  <!-- Wrench icon (centered, large) -->
  <g transform="translate(200,185) rotate(-45)" filter="url(#softGlow)">
    <!-- Wrench handle -->
    <rect x="-10" y="10" width="20" height="65" rx="10" fill="url(#wrenchGrad)"/>
    <!-- Wrench head top -->
    <circle cx="0" cy="5" r="22" fill="url(#wrenchGrad)"/>
    <!-- Wrench head hole -->
    <circle cx="0" cy="5" r="10" fill="#0A1E32"/>
    <!-- Wrench jaw cut -->
    <rect x="-22" y="-18" width="18" height="20" rx="3" fill="#0A1E32"/>
  </g>

  <!-- Accent dot top-right of wrench -->
  <circle cx="248" cy="148" r="6" fill="#00D2FF" opacity="0.9" filter="url(#glow)"/>

  <!-- Brand name: HUNAR -->
  <text x="200" y="298"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="38"
    font-weight="900"
    letter-spacing="8"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)">HUNAR</text>

  <!-- Brand name: HUB -->
  <text x="200" y="334"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="28"
    font-weight="300"
    letter-spacing="14"
    text-anchor="middle"
    fill="#FFFFFF"
    opacity="0.85">HUB</text>

  <!-- Tagline -->
  <text x="200" y="360"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="10"
    font-weight="400"
    letter-spacing="3"
    text-anchor="middle"
    fill="#3A5568">SKILLED WORKERS AT YOUR DOORSTEP</text>

  <!-- Decorative dots -->
  <circle cx="108" cy="348" r="2.5" fill="#00D2FF" opacity="0.5"/>
  <circle cx="292" cy="348" r="2.5" fill="#00D2FF" opacity="0.5"/>
  <circle cx="100" cy="348" r="1.5" fill="#00D2FF" opacity="0.3"/>
  <circle cx="300" cy="348" r="1.5" fill="#00D2FF" opacity="0.3"/>
</svg>
